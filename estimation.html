<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Estimation</title>
</head>
<body>
    <h1>Property Estimation Page</h1>
    <p>Welcome to our property estimation page. Please fill out the form below to get an estimated value for your property.</p>
    <form action="#" method="post">
        <label for="propertyType">Property Type:</label><br>
        <input type="text" id="propertyType" name="propertyType"><br>
        
        <label for="city">City:</label><br>
        <input type="text" id="city" name="city"><br>
        
        <label for="surfaceArea">Surface Area (in m²):</label><br>
        <input type="number" id="surfaceArea" name="surfaceArea"><br>
        
        <label for="rooms">Number of Rooms:</label><br>
        <input type="number" id="rooms" name="rooms"><br>
        
        <label for="contactInfo">Contact Information:</label><br>
        <input type="text" id="contactInfo" name="contactInfo"><br><br>
        
        <input type="submit" value="Estimate">
    </form>
</body>
</html>
