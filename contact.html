<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { margin: 20px 0; }
        label { display: block; margin: 5px 0; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; }
        button { padding: 10px 15px; }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">

        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send</button>
    </form>

    <h2>Contact Information</h2>
    <p>Agency Address: 1234 Agency St, City, Country</p>
    <p>Phone: (123) 456-7890</p>
    <p>Email: info@example.com</p>

    <h2>Our Location</h2>
    <div style="width: 100%; height: 400px;"><iframe style="border:0; width: 100%; height: 100%;" src="https://www.google.com/maps/embed/v1/place?q=place_id:ChIJd8h4fX4pQ0gRaEsm3kkTfUw&key=YOUR_API_KEY" allowfullscreen></iframe></div>
</body>
</html>
